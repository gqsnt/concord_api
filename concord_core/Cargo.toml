[package]
name = "concord_core"
version = "0.1.0"
edition.workspace = true
license.workspace = true

[dependencies]
reqwest = { workspace = true, features = ["default-tls", "http2"] }
http.workspace = true
bytes.workspace = true
serde = { workspace = true, optional = true, features = ["derive"] }
serde_json = { workspace = true, optional = true }
base64.workspace = true
thiserror.workspace = true
url.workspace = true
urlencoding.workspace = true
httpdate.workspace = true
tokio.workspace = true
governor = { workspace = true, optional = true }
moka = { workspace = true, default-features = false, features = [
    "sync",
], optional = true }
http-cache-semantics = { workspace = true, default-features = false, optional = true }


[features]
default = ["rate-limit-governor"]
json = ["dep:serde", "dep:serde_json", "reqwest/json"]
gzip = ["reqwest/gzip"]
brotli = ["reqwest/brotli"]
deflate = ["reqwest/deflate"]
cookies = ["reqwest/cookies"]
multipart = ["reqwest/multipart"]
rate-limit-governor = ["dep:governor"]
cache-moka = ["dep:moka", "dep:http-cache-semantics"]
